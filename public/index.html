const mkAC=()=>new(window.AudioContext||window.webkitAudioContext)();
function playTone(freq){
  const ctx=mkAC(),g=ctx.createGain();
  g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+0.3);
  g.connect(ctx.destination);
  const o=ctx.createOscillator();o.type="sine";o.frequency.setValueAtTime(freq,ctx.currentTime);
  o.connect(g);o.start();
  return{stop:()=>{try{g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);setTimeout(()=>{o.stop();ctx.close();},400);}catch{}}};
}
function playBin(beat,carrier){
  const ctx=mkAC(),mg=ctx.createChannelMerger(2);mg.connect(ctx.destination);
  const mk=v=>{const g=ctx.createGain();g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(v,ctx.currentTime+0.5);return g;};
  const gL=mk(0.3),gR=mk(0.3);gL.connect(mg,0,0);gR.connect(mg,0,1);
  const oL=ctx.createOscillator(),oR=ctx.createOscillator();
  oL.type=oR.type="sine";oL.frequency.setValueAtTime(carrier,ctx.currentTime);oR.frequency.setValueAtTime(carrier+beat,ctx.currentTime);
  oL.connect(gL);oR.connect(gR);oL.start();oR.start();
  return{stop:()=>{try{gL.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);gR.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3);setTimeout(()=>{oL.stop();oR.stop();ctx.close();},400);}catch{}}};
}

function WaveViz({active,freq=440,color="#c8a84b"}){
  const ref=useRef(null),fr=useRef(null),t=useRef(0);
  useEffect(()=>{
    const c=ref.current;if(!c)return;const ctx=c.getContext("2d");
    const draw=()=>{t.current+=0.04;const{width:w,height:h}=c;ctx.clearRect(0,0,w,h);ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.shadowColor=color;ctx.shadowBlur=active?8:0;ctx.beginPath();const amp=active?h*0.35:h*0.08,cy=Math.max(2,Math.min(10,freq/200));for(let x=0;x<w;x++){const y=h/2+amp*Math.sin((x/w)*cy*2*Math.PI+t.current);x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();fr.current=requestAnimationFrame(draw);};
    draw();return()=>cancelAnimationFrame(fr.current);
  },[active,freq,color]);
  return React.createElement("canvas",{ref,width:300,height:50,style:{width:"100%",height:50}});
}

  if(screen==="auth")return<AuthScreen onAuth={u=>{setUser(u);setScreen(u.sub==="trial"||u.sub==="active"?"app":"pricing");}}/>;
  if(screen==="pricing")return<PricingScreen user={user} onActivated={u=>{setUser(u);setScreen("app");}} onLogout={logout}/>;
  return<FrequencyLab user={user} onLogout={logout}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
